<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2744">
<title>Chandrawati Hospital — OPD System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#1a2744;--navy2:#243159;--teal:#00b8a9;--teal2:#00d4c8;
  --bg:#eef2fb;--card:#fff;--border:#dde3f0;--text:#1a2744;
  --muted:#6b7a9d;--danger:#ef4444;--warn:#f59e0b;--success:#10b981;
  --sidebar-w:230px;--font:'Outfit',sans-serif;
  --bnh:60px;--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);height:100%;overflow-x:hidden;}
.hidden{display:none!important;}
/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#c0c7d8;border-radius:10px;}

/* ===== LOGIN ===== */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1f3c,#1a2744,#0f3460);padding:16px;}
.login-card{background:#fff;border-radius:20px;padding:36px 32px;width:400px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.4);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .hx{width:64px;height:64px;background:linear-gradient(135deg,#00b8a9,#1a2744);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:10px;}
.login-logo h1{font-size:20px;font-weight:700;color:#1a2744;}
.login-logo p{font-size:12px;color:#6b7a9d;margin-top:3px;}
.login-tabs{display:flex;background:#eef2fb;border-radius:10px;padding:4px;margin-bottom:22px;}
.login-tab{flex:1;padding:9px;border:none;background:none;border-radius:8px;font-family:var(--font);font-size:13.5px;font-weight:500;color:#6b7a9d;cursor:pointer;transition:.2s;}
.login-tab.active{background:#fff;color:#1a2744;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.lg-field{margin-bottom:16px;}
.lg-field label{display:block;font-size:12.5px;font-weight:600;color:#1a2744;margin-bottom:5px;}
.lg-field input{width:100%;padding:11px 14px;border:2px solid #dde3f0;border-radius:10px;font-family:var(--font);font-size:14px;outline:none;transition:.2s;color:#1a2744;}
.lg-field input:focus{border-color:#00b8a9;}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#1a2744,#0f3460);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:6px;}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,39,68,.4);}
.login-hint{font-size:11.5px;color:#6b7a9d;text-align:center;margin-top:14px;background:#f8f9fd;padding:9px 12px;border-radius:8px;line-height:1.7;}
.login-err{color:#ef4444;font-size:13px;text-align:center;margin-top:8px;}

/* ===== MAIN LAYOUT ===== */
#main-app{display:flex;min-height:100vh;}

/* SIDEBAR - Desktop */
.sidebar{width:var(--sidebar-w);background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo .hl{font-size:18px;font-weight:800;color:var(--teal);}
.sidebar-logo .hs{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.sidebar-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:9px;}
.u-av{width:32px;height:32px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.u-nm{font-size:13px;font-weight:600;}
.u-rl{font-size:11px;color:rgba(255,255,255,.5);}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-sec{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 8px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;transition:.15s;font-size:13px;font-weight:500;color:rgba(255,255,255,.7);margin-bottom:1px;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:var(--teal);color:#fff;font-weight:600;}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);}
.btn-logout{width:100%;padding:8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#fca5a5;font-family:var(--font);font-size:12.5px;cursor:pointer;transition:.2s;}
.btn-logout:hover{background:rgba(239,68,68,.25);}

/* SIDEBAR OVERLAY (mobile) */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;backdrop-filter:blur(2px);}
.sidebar-overlay.show{display:block;}

/* MAIN CONTENT */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;padding:13px 24px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-menu{display:none;width:36px;height:36px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:18px;flex-shrink:0;}
.topbar-title{font-size:17px;font-weight:700;color:var(--navy);flex:1;}
.topbar-date{font-size:12px;color:var(--muted);white-space:nowrap;}
.content-area{flex:1;padding:20px 24px;overflow-y:auto;padding-bottom:calc(var(--bnh) + var(--safe-b) + 20px);}

/* BOTTOM NAV (mobile only) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnh);background:#fff;border-top:2px solid var(--border);z-index:150;padding-bottom:var(--safe-b);display:none;grid-template-columns:repeat(5,1fr);}
.bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--muted);transition:.15s;font-family:var(--font);padding:8px 4px;}
.bn-item.active{color:var(--teal);}
.bn-item .bn-icon{font-size:20px;}
.bn-item .bn-lbl{font-size:10px;font-weight:600;}

/* ===== CARDS ===== */
.card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:18px;}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:14.5px;font-weight:700;color:var(--navy);}
.card-body{padding:18px;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:#fff;border-radius:13px;border:1px solid var(--border);padding:16px 18px;}
.stat-num{font-size:26px;font-weight:800;color:var(--navy);}
.stat-lbl{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:500;}
.stat-icon{font-size:20px;margin-bottom:6px;}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:none;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;text-decoration:none;white-space:nowrap;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy2);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal2);}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--navy);}
.btn-outline:hover{border-color:var(--teal);color:var(--teal);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-xs{padding:4px 8px;font-size:11.5px;border-radius:6px;}
.btn-danger{background:var(--danger);color:#fff;}

/* ===== FORMS ===== */
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.fg2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.sp2{grid-column:span 2;}.sp3{grid-column:span 3;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;font-weight:600;color:var(--navy);}
.field label.req::after{content:" *";color:var(--danger);}
.fld{padding:9px 12px;border:2px solid var(--border);border-radius:9px;font-family:var(--font);font-size:13.5px;color:var(--text);outline:none;transition:.2s;width:100%;}
.fld:focus{border-color:var(--teal);}
textarea.fld{resize:vertical;min-height:65px;}
.hint{font-size:11px;color:var(--muted);}

/* ===== PATIENT TABLE ===== */
.sbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.sbar input,.sbar select{padding:9px 14px;border:2px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13.5px;outline:none;transition:.2s;}
.sbar input:focus{border-color:var(--teal);}
.sbar input{flex:1;min-width:180px;}
.pt-table{width:100%;border-collapse:collapse;}
.pt-table th{padding:9px 12px;text-align:left;font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:#f8f9fd;border-bottom:2px solid var(--border);}
.pt-table td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.pt-table tr:hover td{background:#f8f9fd;}
.uhid{font-size:11px;font-weight:700;background:#eef2fb;color:var(--navy);padding:2px 7px;border-radius:5px;white-space:nowrap;}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.dp{background:#dbeafe;color:#1d4ed8;}
.do{background:#fce7f3;color:#9d174d;}
.dg{background:#d1fae5;color:#065f46;}
.dr{background:#fef3c7;color:#92400e;}
.sw{background:#fef3c7;color:#92400e;}
.si{background:#dbeafe;color:#1d4ed8;}
.sd{background:#d1fae5;color:#065f46;}

/* ===== ANTHROPOMETRY ===== */
.vg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.anthro-box{background:linear-gradient(135deg,#1a2744,#243159);color:#fff;border-radius:13px;padding:18px;margin-bottom:16px;}
.ar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.ai{background:rgba(255,255,255,.1);border-radius:9px;padding:10px;text-align:center;}
.av{font-size:18px;font-weight:700;}
.al{font-size:10.5px;opacity:.7;margin-top:2px;}
.zn{color:#6ee7b7;}.zw{color:#fde68a;}.zd{color:#fca5a5;}
.muac-g{background:#d1fae5;color:#065f46;padding:3px 8px;border-radius:5px;font-weight:700;font-size:11.5px;}
.muac-y{background:#fef3c7;color:#92400e;padding:3px 8px;border-radius:5px;font-weight:700;font-size:11.5px;}
.muac-r{background:#fee2e2;color:#991b1b;padding:3px 8px;border-radius:5px;font-weight:700;font-size:11.5px;}

/* ===== PRESCRIPTION ===== */
.rx-drug-row{background:#f8f9fd;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;position:relative;}
.rx-drug-grid{display:grid;grid-template-columns:2.5fr 1.2fr 1fr 1fr 1.2fr;gap:8px;align-items:start;}
.rx-drug-grid .fld{padding:7px 9px;font-size:12.5px;}
.rx-remove{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:5px;background:#fee2e2;color:#ef4444;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.rx-add-btn{width:100%;padding:10px;border:2px dashed var(--teal);background:transparent;border-radius:10px;color:var(--teal);font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px;}
.rx-add-btn:hover{background:#f0fdfa;}
.dose-hint{font-size:11px;padding:5px 8px;background:linear-gradient(135deg,#f0fdfa,#f0fdf4);border:1px solid #a7f3d0;border-radius:6px;color:#047857;margin-top:4px;line-height:1.5;}

/* ===== DRUG SEARCH DROPDOWN ===== */
.drug-search-wrap{position:relative;}
.drug-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--teal);border-top:none;border-radius:0 0 10px 10px;max-height:220px;overflow-y:auto;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.15);}
.drug-opt{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:.15s;}
.drug-opt:hover{background:#f0fdf4;}
.drug-opt-nm{font-size:13px;font-weight:600;color:var(--navy);}
.drug-opt-ct{font-size:11px;color:var(--muted);}
.drug-opt-ds{font-size:11.5px;color:var(--teal);margin-top:1px;}

/* ===== INVESTIGATIONS ===== */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.inv-item{display:flex;align-items:center;gap:7px;padding:8px 10px;border:2px solid var(--border);border-radius:9px;cursor:pointer;transition:.2s;font-size:12.5px;font-weight:500;}
.inv-item:hover{border-color:var(--teal);}
.inv-item.sel{border-color:var(--teal);background:#f0fdfa;color:var(--teal);}
.inv-item input[type=checkbox]{accent-color:var(--teal);}
.inv-custom{margin-top:10px;}

/* ===== VITALS ===== */
.v-box{background:var(--bg);border:2px solid var(--border);border-radius:11px;padding:12px;text-align:center;}
.v-val{font-size:20px;font-weight:700;color:var(--navy);}
.v-lbl{font-size:11px;color:var(--muted);margin-top:2px;}

/* ===== VISIT HISTORY ===== */
.visit-card{border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.2s;}
.visit-card:hover{border-color:var(--teal);box-shadow:0 4px 12px rgba(0,184,169,.1);}

/* ===== TAB BAR ===== */
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{padding:9px 16px;border:none;background:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s;}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:700;}

/* ===== ALERTS ===== */
.alert{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:12px;}
.alert-info{background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;}
.alert-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}
.alert-warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a;}
.alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:10px;opacity:.4;}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:calc(var(--bnh) + var(--safe-b) + 16px);right:16px;background:#1a2744;color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:500;z-index:999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.3);border-left:4px solid var(--teal);max-width:280px;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:12px;}
.modal-box{background:#fff;border-radius:16px;width:680px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3);}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;}
.modal-hd h3{font-size:15px;font-weight:700;}
.modal-cls{width:26px;height:26px;border-radius:7px;background:#f3f4f6;border:none;cursor:pointer;font-size:15px;}
.modal-body{padding:20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main-content{margin-left:0;}
  .topbar-menu{display:flex;align-items:center;justify-content:center;}
  .bottom-nav{display:grid;}
  .content-area{padding:14px 14px;padding-bottom:calc(var(--bnh) + var(--safe-b) + 16px);}
  .topbar{padding:10px 14px;}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:10px;}
  .fg{grid-template-columns:repeat(2,1fr);}
  .fg .sp3{grid-column:span 2;}
  .vg{grid-template-columns:repeat(2,1fr);}
  .ar{grid-template-columns:repeat(2,1fr);}
  .rx-drug-grid{grid-template-columns:1fr 1fr;gap:6px;}
  .inv-grid{grid-template-columns:repeat(2,1fr);}
  #toast{bottom:calc(var(--bnh) + var(--safe-b) + 10px);right:10px;left:10px;}
  .modal-box{max-height:95vh;}
  .pt-table th:nth-child(5),.pt-table td:nth-child(5),
  .pt-table th:nth-child(6),.pt-table td:nth-child(6){display:none;}
}
@media(max-width:480px){
  .fg{grid-template-columns:1fr;}
  .fg .sp2,.fg .sp3{grid-column:span 1;}
  .fg2{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .rx-drug-grid{grid-template-columns:1fr;}
  .inv-grid{grid-template-columns:repeat(2,1fr);}
  .login-card{padding:24px 18px;}
}

/* ===== PRINT ===== */
@media print{
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;}
}
.print-sheet{font-family:'Lora',serif;background:#fff;max-width:210mm;margin:0 auto;padding:20mm 18mm 16mm;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px double #1a2744;padding-bottom:12px;margin-bottom:14px;}
.phn{font-size:21px;font-weight:700;color:#1a2744;font-family:'Outfit',sans-serif;}
.phs{font-size:11px;color:#6b7a9d;margin-top:3px;font-family:'Outfit',sans-serif;}
.pc{font-size:11px;color:#6b7a9d;text-align:right;font-family:'Outfit',sans-serif;}
.ppts{background:#f8f9fd;border-radius:9px;padding:10px 14px;margin-bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ppt-i{font-size:11.5px;font-family:'Outfit',sans-serif;}
.ppt-i span{font-weight:700;display:block;font-size:13.5px;color:#1a2744;}
.pvits{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px;}
.pvit{background:#f8f9fd;border-radius:7px;padding:6px 9px;font-size:11px;color:#6b7a9d;font-family:'Outfit',sans-serif;}
.pvit span{display:block;font-weight:700;font-size:13px;color:#1a2744;}
.pdb{border:1.5px solid #dde3f0;border-radius:8px;padding:9px 13px;margin-bottom:12px;}
.pdbt{font-size:10px;font-weight:700;color:#6b7a9d;text-transform:uppercase;letter-spacing:.5px;font-family:'Outfit',sans-serif;margin-bottom:4px;}
.prx{font-size:26px;color:#1a2744;font-weight:400;margin-bottom:9px;}
.prxt{width:100%;border-collapse:collapse;margin-bottom:14px;}
.prxt th{font-size:10px;font-weight:700;text-transform:uppercase;color:#6b7a9d;padding:6px 9px;background:#f8f9fd;border-bottom:2px solid #dde3f0;font-family:'Outfit',sans-serif;}
.prxt td{padding:8px 9px;border-bottom:1px solid #f0f4f8;font-size:13px;vertical-align:top;}
.pinvt{width:100%;border-collapse:collapse;margin-bottom:14px;}
.pinvt th{font-size:10px;font-weight:700;text-transform:uppercase;color:#6b7a9d;padding:6px 9px;background:#fff3f9;border-bottom:2px solid #fde8f3;font-family:'Outfit',sans-serif;}
.pinvt td{padding:7px 9px;border-bottom:1px solid #fce7f3;font-size:13px;}
.pft{margin-top:16px;padding-top:10px;border-top:1px solid #dde3f0;display:flex;justify-content:space-between;align-items:flex-end;}
.psig{text-align:right;font-family:'Outfit',sans-serif;}
.psig-nm{font-size:15px;font-weight:700;color:#1a2744;}
.psig-ql{font-size:10.5px;color:#6b7a9d;margin-top:1px;}

// ========================================================
// DOSE CALCULATOR
// ========================================================
function calcDose(drug, weight, dob){
  if(!drug||!weight||weight<=0) return null;
  const ageMonths=dob?ageInMonths(dob):999;
  const ageYears=Math.floor(ageMonths/12);
  const d=DRUGS.find(x=>x.name===drug);
  if(!d||!d.dose_mgkg) return null;
  const mgPerDose=Math.min(d.dose_mgkg*weight, d.max_mg||99999);
  const result={mgDose:Math.round(mgPerDose*10)/10,ageYears,ageMonths,drug:d};
  // Determine form and ml
  if(ageMonths<12){
    // DROPS preferred
    result.formType='drops';
    result.formLabel=d.forms.drops;
    const conc=parseDropConc(d.forms.drops);
    if(conc) result.ml=Math.round((mgPerDose/conc)*10)/10;
  } else if(ageYears<6){
    // SYRUP in ml
    result.formType='syrup';
    result.formLabel=d.forms.syrup;
    const conc=parseSyrupConc(d.forms.syrup);
    if(conc) result.ml=Math.round((mgPerDose/conc)*10)/10;
  } else {
    // TABLETS
    result.formType='tab';
    result.formLabel=d.forms.tab;
    result.ml=null;
    const ts=parseTabStrength(d.forms.tab);
    if(ts) result.tabs=Math.round((mgPerDose/ts)*2)/2; // round to 0.5 tabs
  }
  return result;
}

function parseDropConc(str){
  if(!str) return null;
  // "100mg/ml" → 100, "15mg/ml" → 15, "50mg/ml" → 50
  const m=str.match(/(\d+\.?\d*)\s*mg\/ml/i);
  if(m) return parseFloat(m[1]);
  // "100mg/1ml drops" or "1mg/ml Drops"
  const m2=str.match(/(\d+\.?\d*)\s*mg/i);
  if(m2) return parseFloat(m2[1]);
  return null;
}

function parseSyrupConc(str){
  if(!str) return null;
  // "125mg/5ml" → 25mg/ml, "200mg/5ml" → 40mg/ml, "50mg/5ml" → 10mg/ml
  const m=str.match(/(\d+\.?\d*)\s*mg\/(\d+\.?\d*)\s*ml/i);
  if(m) return parseFloat(m[1])/parseFloat(m[2]);
  return null;
}

function parseTabStrength(str){
  if(!str) return null;
  // "500mg Tab" → 500, "250mg/500mg" → 250 (lowest), "100mg Tab" → 100
  const m=str.match(/(\d+)\s*mg/i);
  if(m) return parseFloat(m[1]);
  return null;
}

function formatDoseHint(res, drug){
  if(!res) return '';
  let hint=`<b>${res.mgDose} mg/dose</b> (${drug.dose_mgkg} mg/kg × weight)`;
  if(res.formType==='drops'&&res.ml){
    hint+=`<br>💧 <b>Drops:</b> <span style="color:#1d4ed8;font-weight:700;">${res.ml} ml</span> — ${res.formLabel}`;
  } else if(res.formType==='syrup'&&res.ml){
    hint+=`<br>🥄 <b>Syrup:</b> <span style="color:#059669;font-weight:700;">${res.ml} ml</span> — ${res.formLabel}`;
  } else if(res.formType==='tab'){
    hint+=`<br>💊 <b>Tablet:</b>${res.tabs?` <span style="color:#7c3aed;font-weight:700;">${res.tabs} tab</span> of`:''}  ${res.formLabel}`;
  }
  if(drug.max_mg&&res.mgDose>=drug.max_mg*0.9){
    hint+=`<br>⚠️ Near/at max dose (${drug.max_mg}mg)`;
  }
  hint+=`<br><span style="color:#6b7280;font-size:10.5px;">${drug.note}</span>`;
  return hint;
}

function genUHID(){return 'CHWH-'+new Date().getFullYear()+'-'+String(S.pts.length+1).padStart(4,'0');}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,8);}
function today(){return new Date().toISOString().split('T')[0];}
function fmtD(d){if(!d)return '-';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function ageInMonths(dob){const b=new Date(dob),n=new Date();return Math.max(0,Math.floor((n-b)/(1000*60*60*24*30.44)));}
function ageInYears(dob){return Math.floor(ageInMonths(dob)/12);}
function calcAge(dob){const b=new Date(dob),n=new Date();let yr=n.getFullYear()-b.getFullYear(),mo=n.getMonth()-b.getMonth();if(mo<0){yr--;mo+=12;}const d=n.getDate()-b.getDate();if(yr>=2)return yr+' yrs';if(yr>=1)return yr+' yr '+mo+' mo';return mo+' mo '+(d<0?0:d)+' days';}
function dc(dept){if(!dept)return '';const dl=dept.toLowerCase();if(dl.includes('pedia'))return 'dp';if(dl.includes('obg')||dl.includes('gyne'))return 'do';if(dl.includes('gen'))return 'dg';if(dl.includes('ortho'))return 'dr';return 'dp';}

function setupEnterNav(){
  document.querySelectorAll('.fld:not(textarea):not([data-no-enter])').forEach(el=>{
    el.removeEventListener('keydown',enterHandler);
    el.addEventListener('keydown',enterHandler);
  });
}
function enterHandler(e){
  if(e.key!=='Enter')return;
  e.preventDefault();
  const inputs=[...document.querySelectorAll('input.fld:not([disabled]):not([readonly]),select.fld:not([disabled])')];
  const idx=inputs.indexOf(e.target);
  if(idx>=0&&idx<inputs.length-1){inputs[idx+1].focus();inputs[idx+1].select&&inputs[idx+1].select();}
  else{const btn=document.querySelector('.btn-primary:not([disabled])');if(btn)btn.click();}
}

// Z-score (simplified WHO)
const WFA_B={0:[3.3,2.9,2.5,2.1],3:[6.4,5.7,5.0,4.3],6:[7.9,7.1,6.3,5.5],9:[9.0,8.1,7.2,6.3],12:[9.7,8.7,7.7,6.8],18:[10.9,9.7,8.6,7.6],24:[12.0,10.6,9.4,8.3],36:[14.3,12.6,11.1,9.8],48:[16.3,14.4,12.7,11.1],60:[18.3,16.1,14.1,12.3]};
const WFA_G={0:[3.2,2.8,2.4,2.0],3:[5.8,5.2,4.5,4.0],6:[7.3,6.5,5.7,5.0],9:[8.2,7.3,6.4,5.6],12:[8.9,7.9,6.9,6.0],18:[10.2,9.0,7.9,6.9],24:[11.5,10.2,8.9,7.8],36:[13.9,12.2,10.7,9.3],48:[15.9,13.9,12.1,10.5],60:[17.9,15.7,13.6,11.8]};
const HFA_B={0:[49.9,47.5,45.2,42.8],3:[61.4,58.5,55.6,52.7],6:[67.6,64.4,61.2,58.0],9:[72.0,68.7,65.5,62.3],12:[75.7,72.1,68.6,65.1],18:[82.3,78.1,74.1,70.1],24:[87.8,83.6,79.3,75.1],36:[96.1,91.5,86.9,82.4],48:[103.3,98.4,93.5,88.6],60:[110.0,104.7,99.4,94.1]};
const HFA_G={0:[49.1,46.8,44.5,42.3],3:[59.8,57.0,54.3,51.5],6:[65.7,62.5,59.3,56.2],9:[70.1,66.7,63.3,60.0],12:[74.0,70.3,66.7,63.1],18:[80.7,76.5,72.3,68.2],24:[86.4,82.0,77.7,73.3],36:[95.1,90.5,85.9,81.3],48:[102.7,97.7,92.7,87.7],60:[109.4,104.2,98.9,93.7]};
function getZ(val,mos,sex,type){
  const T=type==='wfa'?(sex==='male'?WFA_B:WFA_G):(sex==='male'?HFA_B:HFA_G);
  const ages=Object.keys(T).map(Number).sort((a,b)=>a-b);
  let lo=ages[0];
  for(let a of ages){if(a<=mos)lo=a;}
  const ref=T[lo];if(!ref)return null;
  const [med,m1,m2,m3]=ref;
  const sd=(med-m2)/2;if(sd===0)return null;
  return Math.round((val-med)/sd*10)/10;
}
function getWHZ(wt,ht,sex){
  const r=[[65,7.0,6.7],[70,8.0,7.6],[75,9.0,8.6],[80,9.9,9.5],[85,10.8,10.4],[90,11.8,11.4],[95,12.9,12.5],[100,14.0,13.6],[105,15.2,14.8],[110,16.4,16.1],[115,17.7,17.4],[120,19.0,18.7]];
  if(ht<65||ht>120)return null;
  let lo=r[0],hi=r[r.length-1];
  for(let i=0;i<r.length-1;i++){if(r[i][0]<=ht&&r[i+1][0]>ht){lo=r[i];hi=r[i+1];break;}}
  const t=(ht-lo[0])/(hi[0]-lo[0]);const med=lo[sex==='male'?1:2]+(hi[sex==='male'?1:2]-lo[sex==='male'?1:2])*t;
  return Math.round((wt-med)/(med*0.11)*10)/10;
}
function intZ(z){if(z===null)return{c:'',t:''};if(z<-3)return{c:'zd',t:'SAM (-3SD)'};if(z<-2)return{c:'zw',t:'MAM (-2SD)'};if(z<-1)return{c:'zw',t:'Mild ↓ (-1SD)'};if(z>2)return{c:'zn',t:'Above +2SD'};return{c:'zn',t:'Normal'};}
function intMUAC(m,mos){if(!m||mos<6||mos>59)return null;if(m<11.5)return{c:'muac-r',t:'SAM <11.5cm'};if(m<12.5)return{c:'muac-y',t:'MAM 11.5–12.5cm'};return{c:'muac-g',t:'Normal ≥12.5cm'};}

function previewAnthro(ptId){
  const pt=S.pts.find(p=>p.id===ptId);if(!pt)return;
  const wt=parseFloat(document.getElementById('vwt').value);
  const ht=parseFloat(document.getElementById('vht').value);
  const muacEl=document.getElementById('vmuac');const muac=muacEl?parseFloat(muacEl.value):null;
  const mos=ageInMonths(pt.dob),yrs=ageInYears(pt.dob);
  if(!wt&&!ht){document.getElementById('apreview').innerHTML='<div class="alert alert-warn">Enter weight/height first.</div>';return;}
  const waz=wt?getZ(wt,mos,pt.sex,'wfa'):null;
  const haz=ht?getZ(ht,mos,pt.sex,'hfa'):null;
  const whz=(wt&&ht&&mos<60)?getWHZ(wt,ht,pt.sex):null;
  const bmi=wt&&ht?Math.round(wt/Math.pow(ht/100,2)*10)/10:null;
  const mi=intMUAC(muac,mos);
  if(mos<60){
    document.getElementById('apreview').innerHTML=`<div class="anthro-box">
      <div style="font-size:12px;font-weight:600;opacity:.7;margin-bottom:8px;">📊 WHO Anthropometry — Under 5 years</div>

        ${waz!==null?`<div class="ai"><div class="av ${intZ(waz).c}">${waz}</div><div class="al">WAZ<br><small>${intZ(waz).t}</small></div></div>`:''}
        ${haz!==null?`<div class="ai"><div class="av ${intZ(haz).c}">${haz}</div><div class="al">HAZ<br><small>${intZ(haz).t}</small></div></div>`:''}
        ${whz!==null?`<div class="ai"><div class="av ${intZ(whz).c}">${whz}</div><div class="al">WHZ<br><small>${intZ(whz).t}</small></div></div>`:''}
        ${mi?`<div class="ai"><div class="av"><span class="${mi.c}">${muac}cm</span></div><div class="al">MUAC<br><small>${mi.t}</small></div></div>`:''}
      </div></div>`;
  } else {
    const bmiI=bmi?(bmi<16?'Severely Underweight':bmi<18.5?'Underweight':bmi<23?'Normal':bmi<27?'Overweight':'Obese'):'';
    document.getElementById('apreview').innerHTML=`<div class="anthro-box"><div style="font-size:12px;font-weight:600;opacity:.7;margin-bottom:8px;">📊 Anthropometry — 5+ years (BMI)</div><div class="ar">
      ${wt?`<div class="ai"><div class="av zn">${wt}kg</div><div class="al">Weight</div></div>`:''}
      ${ht?`<div class="ai"><div class="av zn">${ht}cm</div><div class="al">Height</div></div>`:''}
      ${bmi?`<div class="ai"><div class="av ${bmi<18.5?'zw':'zn'}">${bmi}</div><div class="al">BMI<br><small>${bmiI}</small></div></div>`:''}
    </div></div>`;
  }
}

function rxTab(k,btn){
  document.querySelectorAll('[id^=rxt-]').forEach(d=>d.style.display='none');
  document.getElementById('rxt-'+k).style.display='block';
  document.querySelectorAll('#rx-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function invTab(k,btn){
  document.querySelectorAll('[id^=invt-]').forEach(d=>d.style.display='none');
  document.getElementById('invt-'+k).style.display='block';
  document.querySelectorAll('#inv-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleInv(name,el){
  S.selInv[name]=!S.selInv[name];
  if(!S.selInv[name])delete S.selInv[name];
  if(el){el.classList.toggle('sel',!!S.selInv[name]);const cb=el.querySelector('input[type=checkbox]');if(cb)cb.checked=!!S.selInv[name];}
  const cnt=document.querySelector('#custom-inv-list')?.parentElement?.nextElementSibling;
  if(cnt)cnt.textContent=Object.keys(S.selInv).filter(k=>S.selInv[k]).length+' investigations selected';
}
function addCustomInv(){
  const inp=document.getElementById('inv-custom');
  const val=inp.value.trim();if(!val)return;
  S.selInv[val]=true;inp.value='';
  const list=document.getElementById('custom-inv-list');
  if(list)list.innerHTML=Object.keys(S.selInv).filter(k=>!Object.values(INVESTIGATIONS).flat().includes(k)).map(k=>`<span style="background:#eef2fb;padding:3px 9px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:5px;">${k}<button onclick="toggleInv('${k.replace(/'/g,"\\'")}',null)" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:13px;">×</button></span>`).join('');
}

function rRxList(){
  if(!S.rxDrugs||S.rxDrugs.length===0)return '<div style="color:var(--muted);font-size:13px;padding:6px 0;">No drugs added yet.</div>';
  const pt=S.selPt;const wt=pt?(S.visits.find(v=>v.ptId===pt.id&&v.date===today())?.vitals?.weight||null):null;
  return S.rxDrugs.map((d,i)=>{
    const dr=DRUGS.find(x=>x.name===d.drug);
    const res=(dr&&wt&&pt)?calcDose(d.drug,wt,pt.dob):null;
    const hint=res?formatDoseHint(res,dr):'';
    return `<div class="rx-drug-row" id="rxrow-${i}">
      <button class="rx-remove" onclick="remRx(${i})">×</button>
      <div class="rx-drug-grid">
        <div class="field"><label style="font-size:11px;">Drug / Medicine</label>
          <div class="drug-search-wrap">
            <input id="rxd-${i}" class="fld" value="${d.drug}" placeholder="Drug name" oninput="rxDSearch(${i},this.value)" onchange="S.rxDrugs[${i}].drug=this.value;updateDoseHint(${i})" style="font-weight:600;">
            <div id="rxdd-${i}" class="drug-dd" style="display:none;"></div>
          </div>
        </div>
        <div class="field"><label style="font-size:11px;">Dose (auto-calculated)</label>
          <input id="rxdose-${i}" class="fld" value="${d.dose}" onchange="S.rxDrugs[${i}].dose=this.value" placeholder="mg/kg or ml">
        </div>
        <div class="field"><label style="font-size:11px;">Frequency</label>
          <select id="rxfreq-${i}" class="fld" onchange="S.rxDrugs[${i}].freq=this.value">
            ${['OD','BD','TDS','QID','Q4-6h','Q6h','Q8h','Q12h','HS','PRN','SOS','Single dose','2x/week'].map(f=>`<option ${d.freq===f?'selected':''}>${f}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label style="font-size:11px;">Duration</label>
          <select id="rxdur-${i}" class="fld" onchange="S.rxDrugs[${i}].dur=this.value">
            ${['1 day','2 days','3 days','5 days','7 days','10 days','14 days','21 days','28 days','1 month','2 months','3 months','Till review','Continuous'].map(dur=>`<option ${d.dur===dur?'selected':''}>${dur}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label style="font-size:11px;">Instructions</label>
          <select id="rxinst-${i}" class="fld" onchange="S.rxDrugs[${i}].instr=this.value">
            ${['After food','Before food','With food','Empty stomach','At bedtime','With milk','With water','As directed'].map(ins=>`<option ${d.instr===ins?'selected':''}>${ins}</option>`).join('')}
          </select>
        </div>
      </div>
      ${hint?`<div class="dose-hint" id="rxhint-${i}">${hint}</div>`:`<div class="dose-hint" id="rxhint-${i}" style="display:${wt?'block':'none'};background:#f9fafb;color:var(--muted);">Enter drug name to see dose recommendation</div>`}
    </div>`;
  }).join('');
}

function addRxRow(drugObj){
  const nd=drugObj?{drug:drugObj.name,dose:'',freq:drugObj.freq[0]||'TDS',dur:'5 days',instr:'After food'}:{drug:'',dose:'',freq:'TDS',dur:'5 days',instr:'After food'};
  S.rxDrugs.push(nd);
  const i=S.rxDrugs.length-1;
  // if drugObj provided, auto-calculate dose
  const pt=S.selPt;const wt=pt?(S.visits.find(v=>v.ptId===pt.id&&v.date===today())?.vitals?.weight||null):null;
  if(drugObj&&wt&&pt){const res=calcDose(drugObj.name,wt,pt.dob);if(res){nd.dose=res.ml?res.ml+' ml':(res.tabs?res.tabs+' tab':res.mgDose+' mg');}}
  document.getElementById('rxdlist').innerHTML=rRxList();
  setTimeout(()=>{const inp=document.getElementById('rxd-'+i);if(inp){inp.focus();inp.select&&inp.select();}setupEnterNav();},50);
}

function remRx(i){S.rxDrugs.splice(i,1);document.getElementById('rxdlist').innerHTML=rRxList();setupEnterNav();}

function rxDSearch(i,q){
  const dd=document.getElementById('rxdd-'+i);if(!q||q.length<2){dd.style.display='none';return;}
  const filt=DRUGS.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())||d.cat.toLowerCase().includes(q.toLowerCase())).slice(0,12);
  dd.style.display=filt.length?'block':'none';
  dd.innerHTML=filt.map(d=>`<div class="drug-opt" onclick="selectDrug(${i},'${d.name.replace(/'/g,"\\'")}')">
    <div class="drug-opt-nm">${d.name}</div>
    <div class="drug-opt-ct">${d.cat}</div>
    <div class="drug-opt-ds">${d.dose_mgkg?d.dose_mgkg+' mg/kg':''} · ${d.freq.join('/')}</div>
  </div>`).join('');
}

function selectDrug(i,name){
  const pt=S.selPt;const wt=pt?(S.visits.find(v=>v.ptId===pt.id&&v.date===today())?.vitals?.weight||null):null;
  S.rxDrugs[i].drug=name;
  const inp=document.getElementById('rxd-'+i);if(inp)inp.value=name;
  const dd=document.getElementById('rxdd-'+i);if(dd)dd.style.display='none';
  // auto-calculate dose
  if(wt&&pt){
    const res=calcDose(name,wt,pt.dob);
    if(res){
      const doseVal=res.ml?res.ml+' ml':(res.tabs?res.tabs+' tab':res.mgDose+' mg');
      S.rxDrugs[i].dose=doseVal;
      const doseInp=document.getElementById('rxdose-'+i);if(doseInp)doseInp.value=doseVal;
      const hintEl=document.getElementById('rxhint-'+i);
      const dr=DRUGS.find(x=>x.name===name);
      if(hintEl&&dr)hintEl.innerHTML=formatDoseHint(res,dr);
    }
  }
  // move focus to dose field
  setTimeout(()=>{const d=document.getElementById('rxdose-'+i);if(d){d.focus();d.select&&d.select();}},50);
}

function updateDoseHint(i){
  const pt=S.selPt;const wt=pt?(S.visits.find(v=>v.ptId===pt.id&&v.date===today())?.vitals?.weight||null):null;
  if(!wt||!pt)return;
  const name=S.rxDrugs[i]?.drug;if(!name)return;
  const res=calcDose(name,wt,pt.dob);
  const dr=DRUGS.find(x=>x.name===name);
  const hintEl=document.getElementById('rxhint-'+i);
  if(hintEl&&res&&dr)hintEl.innerHTML=formatDoseHint(res,dr);
}

function rDrugSide(q){
  const filt=q?DRUGS.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())||d.cat.toLowerCase().includes(q.toLowerCase())):DRUGS.slice(0,35);
  return filt.slice(0,40).map(d=>`<div onclick="addRxRow(DRUGS.find(x=>x.name==='${d.name.replace(/'/g,"\\'")}'))" style="padding:7px 9px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:.15s;" onmouseover="this.style.background='#f0fdfa'" onmouseout="this.style.background=''">
    <div style="font-size:13px;font-weight:600;color:var(--navy);">${d.name}</div>
    <div style="font-size:10.5px;color:var(--muted);">${d.cat}</div>
    <div style="font-size:11.5px;color:var(--teal);">${d.dose_mgkg?d.dose_mgkg+' mg/kg':'Topical/Fixed dose'} · ${d.freq[0]}</div>
  </div>`).join('');
}
function renderDrugSide(q){const el=document.getElementById('dsidelist');if(el)el.innerHTML=rDrugSide(q);}

function saveConsult(){
  const pt=S.selPt;if(!pt){toast('Select a patient first','error');return;}
  let tv=S.visits.find(v=>v.ptId===pt.id&&v.date===today());
  if(!tv){tv={id:uid(),ptId:pt.id,date:today(),dept:pt.dept,status:'inprogress',vitals:{},anthro:{},complaints:'',exam:'',diag:'',rx:[],inv:[],instructions:'',followup:'',docId:'',docName:'',createdAt:new Date().toISOString()};S.visits.push(tv);}
  tv.complaints=document.getElementById('rx-cc')?.value||'';
  tv.exam=document.getElementById('rx-ex')?.value||'';
  tv.diag=document.getElementById('rx-dg')?.value||'';
  tv.rx=S.rxDrugs.map(d=>({...d}));
  tv.inv=Object.keys(S.selInv).filter(k=>S.selInv[k]);
  tv.instructions=document.getElementById('rx-inst')?.value||'';
  tv.followup=document.getElementById('rx-fu')?.value||'';
  tv.docId=S.user.id;tv.docName=S.user.name;tv.status='done';
  save();toast('Consultation saved!');
}

function savePrintRx(){saveConsult();const pt=S.selPt;if(!pt)return;const tv=S.visits.find(v=>v.ptId===pt.id&&v.date===today());if(tv)printRx(tv.id);}

  ${vit.rr?`<div class="pvit">RR<span>${vit.rr}/min</span></div>`:''}
  ${vit.spo2?`<div class="pvit">SpO₂<span>${vit.spo2}%</span></div>`:''}
  ${vit.weight?`<div class="pvit">Weight<span>${vit.weight}kg</span></div>`:''}
  ${vit.height?`<div class="pvit">Height<span>${vit.height}cm</span></div>`:''}
</div>`:''}

${(ant.waz!==null&&ant.waz!==undefined)?`<div class="pantro">${ant.waz!==null?`WAZ: <span>${ant.waz}</span>`:''}${ant.haz!==null?` · HAZ: <span>${ant.haz}</span>`:''}${ant.whz!==null&&mos<60?` · WHZ: <span>${ant.whz}</span>`:''}${ant.bmi?` · BMI: <span>${ant.bmi}</span>`:''}${ant.muac?` · MUAC: <span>${ant.muac}cm</span>`:''}</div>`:''}

${v.complaints?`<div class="pdb"><div class="pdbt">Chief Complaints</div>${v.complaints}</div>`:''}
${v.diag?`<div class="pdb"><div class="pdbt">Diagnosis / Clinical Impression</div><b>${v.diag}</b></div>`:''}

${v.rx&&v.rx.length>0?`<div class="prx">Rx</div>
<table class="prxt"><thead><tr><th>#</th><th>Drug / Medicine</th><th>Dose</th><th>Frequency</th><th>Duration</th><th>Instructions</th></tr></thead><tbody>
${v.rx.map((r,i)=>`<tr><td style="color:#6b7a9d;font-size:11.5px;">${i+1}</td><td style="font-weight:700;font-size:14px;">${r.drug}</td><td>${r.dose||'-'}</td><td>${r.freq||'-'}</td><td>${r.dur||'-'}</td><td style="color:#6b7a9d;font-size:12px;">${r.instr||'-'}</td></tr>`).join('')}
</tbody></table>`:''}

${invList.length>0?`<div class="prx" style="font-size:20px;font-family:'Outfit',sans-serif;font-weight:700;color:#9d174d;margin-bottom:8px;">🔬 Investigations Ordered</div>
<table class="pinvt"><thead><tr><th>#</th><th>Investigation</th><th>Sample / Remarks</th></tr></thead><tbody>
${invList.map((inv,i)=>`<tr><td style="color:#9d174d;font-size:11.5px;">${i+1}</td><td>${inv}</td><td style="color:#6b7a9d;font-size:12px;"></td></tr>`).join('')}
</tbody></table>`:''}

${v.instructions?`<div class="pdb"><div class="pdbt">Instructions / Advice</div>${v.instructions}</div>`:''}
${v.followup?`<div style="font-size:13.5px;margin-bottom:10px;"><b>Follow-up:</b> ${fmtD(v.followup)}</div>`:''}

<div class="pft">
  <div style="font-size:12px;color:#6b7a9d;">⚠ Prescription valid 7 days · Bring this prescription on next visit</div>
  <div class="psig">
    <div style="min-height:38px;border-bottom:1px solid #1a2744;min-width:150px;margin-bottom:5px;"></div>
    <div class="psig-nm">${doc.name}</div>
    <div class="psig-ql">${doc.qual||''}</div>
    <div class="psig-ql">${doc.dept} · Chandrawati Hospital</div>
  </div>
</div>
<div style="text-align:center;margin-top:10px;font-size:9.5px;color:#c8cfe0;">Chandrawati Hospital OPD System · Confidential</div>
</div><script>window.onload=()=>window.print();<\/script></body></html>`;
  const w=window.open('','_blank','width=900,height=700');
  if(w){w.document.write(html);w.document.close();}else toast('Allow popups to print','error');
}

// ========================================================
// MODAL
// ========================================================
function showModal(h){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-box">${h}</div></div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

// ========================================================
// INIT
// ========================================================
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('tdate').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('lu').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp').focus();});
  document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
});

// Close drug dropdowns on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.drug-search-wrap'))document.querySelectorAll('.drug-dd').forEach(d=>d.style.display='none');
});
</script>
</body>
